services:
  - type: web
    name: speech-therapy-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: WHISPER_MODEL
        value: tiny
      - key: PORT
        value: 8000
    healthCheckPath: /health
